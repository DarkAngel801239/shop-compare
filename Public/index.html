<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShopCompare — Find the Best Price</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>🛒 ShopCompare</h1>
    <p>Search once. Compare prices across stores instantly.</p>
  </header>

  <main>
    <form id="search-form">
      <input
        type="text"
        id="search-input"
        placeholder="Search for a product, e.g. 'wireless headphones'"
        required
      >
      <button type="submit">Search</button>
    </form>

    <div id="status"></div>

    <div id="ai-recommendation"></div>

    <div id="results" class="results-grid"></div>
  </main>

  <script src="app.js"></script>
</body>
</html>
